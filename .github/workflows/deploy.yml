name: Deploy Murdoku to GitHub Pages and Fly.io

# Deploy on every push to every branch (and on manual dispatch).
# Each run overwrites the previously deployed Pages site, so the most-recent
# commit on any branch is what ends up live. This matches the project's
# requirement to "deploy on all commits regardless of branch."
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow at most one Pages deploy at a time; cancel any in-flight run if a new
# commit lands first. The deploy-api job has its own concurrency group so a
# Fly deploy is not interrupted by a Pages-only push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The portrait + furniture PNGs are committed, but we regenerate them
      # on every deploy so that updates to the generators propagate without
      # a separate "regenerate art" commit.
      - name: Regenerate portraits
        run: node scripts/generate-portraits.js

      - name: Regenerate furniture
        run: node scripts/generate-furniture.js

      - name: Regenerate badge icons
        run: node scripts/generate-icons.js

      # Keep generated PNGs deterministic across runs by failing fast if
      # one of the scripts errors out.
      - name: Check generated assets
        run: |
          test -f assets/portraits/manifest.json
          test -f assets/furniture/manifest.json
          test -f assets/icons/victim.png
          test -f assets/icons/killer.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Companion API deploy. Runs in parallel with the Pages deploy and
  # only fires on the canonical repo so forks without Fly access fall
  # through cleanly. The Fly app, volume, and secrets must exist before
  # the first run; see server/README.md for the one-time bootstrap.
  deploy-api:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'RubenTipparach/murdoku-companion' }}
    concurrency:
      group: fly-api
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Confirm Fly auth and app exist
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::FLY_API_TOKEN repo secret is empty or missing."
            exit 1
          fi
          flyctl version
          flyctl auth whoami
          flyctl status -a murdoku-companion

      # Single-writer sqlite needs exactly one machine on one volume.
      # The user's existing app sits in ams, so we ensure a volume in
      # ams and scale the app down to a single machine before deploy.
      # Both steps are idempotent: no-op if already in the right state.
      - name: Ensure volume + single machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          APP: murdoku-companion
          REGION: ams
        run: |
          set -e
          echo "--- volumes before ---"
          flyctl volumes list -a "$APP"
          VOL_COUNT=$(flyctl volumes list -a "$APP" --json | jq '[.[] | select(.name=="murdoku_data" and .region=="'"$REGION"'")] | length')
          if [ "${VOL_COUNT:-0}" -lt 1 ]; then
            echo "Creating volume murdoku_data in $REGION"
            flyctl volumes create murdoku_data --size 1 --region "$REGION" --app "$APP" --yes
          else
            echo "Volume murdoku_data already exists in $REGION"
          fi
          echo "--- scaling to 1 machine ---"
          flyctl scale count 1 --region "$REGION" --app "$APP" --yes

      - name: Deploy API to Fly.io
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
