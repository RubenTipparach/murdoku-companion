<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Murdoku</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23583c87'/%3E%3Ctext x='8' y='12' font-size='12' text-anchor='middle' fill='white' font-family='monospace'%3EM%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="topbar">
      <h1>Murdoku</h1>
      <div class="level-meta">
        <input id="level-name" type="text" placeholder="Untitled level" />
      </div>
      <div class="mode-toggle">
        <button id="mode-edit" class="active">Edit</button>
        <button id="mode-play">Play</button>
      </div>
      <div class="topbar-actions">
        <button id="btn-levels">Levels</button>
        <button id="btn-save">Save</button>
        <button id="btn-export">Export</button>
        <button id="btn-import">Import</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
    </header>

    <main class="layout">
      <section class="board-wrap">
        <div id="grid" class="grid" aria-label="9 by 9 grid"></div>
        <div id="status" class="status">Edit mode · paint a room to begin</div>
      </section>

      <aside class="side-panel">
        <!-- Edit-mode tools -->
        <div id="edit-tools" class="panel">
          <h2>Tools</h2>
          <div class="tool-row">
            <button data-tool="paint" class="tool active">Paint</button>
            <button data-tool="erase" class="tool">Erase</button>
            <button data-tool="doorway" class="tool">Doorway</button>
            <button data-tool="solution" class="tool">Solution</button>
          </div>

          <h2>Rooms</h2>
          <div class="room-controls">
            <button id="btn-new-room">+ New room</button>
            <button id="btn-roll-all" title="Roll tile patterns and furniture for every room">🎲 Roll all</button>
          </div>
          <ul id="room-list" class="room-list"></ul>

          <h2>Suspects</h2>
          <p class="hint">
            With the <em>Solution</em> tool, click a suspect then click a room cell.
          </p>
          <div id="char-roster" class="char-roster"></div>
        </div>

        <!-- Play-mode tools -->
        <div id="play-tools" class="panel hidden">
          <h2>Suspects</h2>
          <p class="hint">Click a suspect, then click a cell to place them.</p>
          <div id="char-roster-play" class="char-roster"></div>

          <div class="play-actions">
            <button id="btn-check">Check solution</button>
            <button id="btn-reset-play">Clear board</button>
          </div>

          <h2>Rooms</h2>
          <ul id="room-list-play" class="room-list readonly"></ul>
        </div>
      </aside>

      <section class="meta-panel">
        <h2>Level description</h2>
        <textarea
          id="level-description"
          rows="3"
          placeholder="Set the scene for your players…"
        ></textarea>
      </section>
    </main>

    <!-- Levels modal -->
    <div id="levels-modal" class="modal hidden" role="dialog">
      <div class="modal-inner">
        <header>
          <h2>Levels</h2>
          <button class="close" data-close="levels">×</button>
        </header>
        <div class="modal-body">
          <button id="btn-new-level">+ New level</button>
          <ul id="levels-list" class="levels-list"></ul>
        </div>
      </div>
    </div>

    <!-- Win toast -->
    <div id="win-toast" class="toast hidden">
      <strong>Case closed.</strong>
      <span id="win-detail"></span>
      <button data-close="toast">OK</button>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
